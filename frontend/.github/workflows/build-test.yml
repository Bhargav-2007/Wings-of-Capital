name: Build & Test
on:
  pull_request:
    branches: [ main ]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install dependencies
        run: |
          cd frontend
          npm ci || true
      - name: Lint
        run: |
          cd frontend
          npm run lint || true
      - name: Test
        run: |
          cd frontend
          npm test || true
