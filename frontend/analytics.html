<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Wings of Capital - Analytics">
  <meta name="theme-color" content="#111827">

  <title>Analytics - Wings of Capital</title>

  <script src="/js/theme.js"></script>
  <link rel="manifest" href="/manifest.json">

  <!-- Core CSS -->
  <link rel="stylesheet" href="/css/design-system.css">
  <link rel="stylesheet" href="/css/styles.css">
  <link rel="stylesheet" href="/css/components.css">
  <link rel="stylesheet" href="/css/utilities.css">
</head>
<body class="app-shell">

  <!-- Sidebar injected by JS -->
  <aside class="app-sidebar"></aside>

  <main class="app-main">
    <header class="action-bar z-sticky">
      <div class="action-bar-left">
        <h2 class="text-xl font-bold">Analytics & Reporting</h2>
      </div>
    </header>

    <div class="page-content d-flex items-center justify-center min-h-screen" style="min-height: calc(100vh - 80px);">
        <div class="text-center animate-fade-in">
            <div class="text-4xl mb-4">📈</div>
            <h3 class="text-2xl font-bold mb-2">Analytics Engine Module</h3>
            <p class="text-tertiary">Advanced reporting and tax export features are being provisioned.</p>
        </div>
    </div>
  </main>

  <div id="toast-container"></div>

  <!-- Core Scripts -->
  <script src="/js/state.js"></script>
  <script src="/js/api.js"></script>
  <script src="/js/auth.js"></script>
  
  <!-- Components -->
  <script src="/js/components/sidebar.js"></script>
  
  <!-- View Logic -->
  <script>
      document.addEventListener('DOMContentLoaded', () => {
          if (!AuthManager.requireAuth()) return;
          Sidebar.render('analytics');
      });
  </script>

</body>
</html>
