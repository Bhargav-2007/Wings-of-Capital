<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Wings of Capital - Portfolio Management">
  <meta name="theme-color" content="#111827">

  <title>Portfolio - Wings of Capital</title>

  <script src="/js/theme.js"></script>
  <link rel="manifest" href="/manifest.json">

  <!-- Core CSS -->
  <link rel="stylesheet" href="/css/design-system.css">
  <link rel="stylesheet" href="/css/styles.css">
  <link rel="stylesheet" href="/css/components.css">
  <link rel="stylesheet" href="/css/utilities.css">
  
  <!-- Chart.js -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
</head>
<body class="app-shell">

  <!-- Sidebar injected by JS -->
  <aside class="app-sidebar"></aside>

  <main class="app-main">
    
    <!-- Action Bar -->
    <header class="action-bar z-sticky">
      <div class="action-bar-left">
        <h2 class="text-xl font-bold">Portfolio Management</h2>
      </div>
      <div class="action-bar-right">
        <button class="btn btn-outline-primary btn-sm">
          <span class="nav-item-icon">📥</span> Export CSV
        </button>
        <button class="btn btn-primary btn-sm">
          <span class="nav-item-icon">➕</span> Deposit Funds
        </button>
      </div>
    </header>

    <!-- Main Content -->
    <div class="page-content">
      
      <!-- Top KPIs -->
      <div class="grid-3 mb-6">
        <div class="card stat-card">
          <div class="stat-label">Total Asset Value</div>
          <div class="stat-value" id="portfolio-total">--</div>
          <div class="stat-change up" id="portfolio-change">
            <span>↑</span> <span>--</span> (24h)
          </div>
        </div>
        <div class="card stat-card">
          <div class="stat-label">Staked Assets</div>
          <div class="stat-value" id="portfolio-staked">--</div>
          <div class="stat-change text-tertiary">
            Generating Yield
          </div>
        </div>
        <div class="card stat-card">
          <div class="stat-label">Total PnL (All Time)</div>
          <div class="stat-value text-success" id="portfolio-pnl">--</div>
          <div class="stat-change up">
            <span>+</span> <span id="portfolio-pnl-pct">--</span>
          </div>
        </div>
      </div>

      <!-- Performance Chart -->
      <div class="card mb-6">
        <div class="card-header border-none pb-0">
          <h3 class="card-title">Historical Performance</h3>
          <div class="period-tabs">
            <button class="period-tab" data-period="1W">1W</button>
            <button class="period-tab active" data-period="1M">1M</button>
            <button class="period-tab" data-period="1Y">1Y</button>
            <button class="period-tab" data-period="ALL">ALL</button>
          </div>
        </div>
        <div class="chart-container chart-container-lg mt-4">
          <canvas id="performanceChart"></canvas>
        </div>
      </div>

      <!-- Assets Table -->
      <div class="card">
        <div class="card-header mb-4">
          <h3 class="card-title">Asset Holdings</h3>
        </div>
        <div id="assets-table-container">
          <div class="text-center p-6 text-tertiary skeleton" style="min-height: 300px;">Loading assets...</div>
        </div>
      </div>

    </div>
  </main>

  <div id="toast-container"></div>

  <!-- Core Scripts -->
  <script src="/js/state.js"></script>
  <script src="/js/api.js"></script>
  <script src="/js/auth.js"></script>
  <script src="/js/utils/formatters.js"></script>
  <script src="/js/utils/chart-helpers.js"></script>
  
  <!-- Components -->
  <script src="/js/components/sidebar.js"></script>
  <script src="/js/components/charts.js"></script>
  <script src="/js/components/table.js"></script>
  
  <!-- View Logic -->
  <script src="/js/views/portfolio.js"></script>

</body>
</html>
