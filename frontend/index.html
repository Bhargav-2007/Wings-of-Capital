<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Wings of Capital - Open-Source Fintech Platform">
    <meta name="theme-color" content="#1F2937">
    
    <title>Wings of Capital - Fintech Platform</title>
    
    <!-- Tailwind CSS via CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Chart.js for financial visualizations -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.prod.js"></script>
    
    <!-- Custom styles -->
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="css/components.css">
    <link rel="stylesheet" href="css/utilities.css">
    
    <!-- PWA Manifest -->
    <link rel="manifest" href="manifest.json">
</head>
<body class="bg-gray-900 text-gray-100">
    <!-- Main App Container -->
    <div id="app" class="min-h-screen flex flex-col">
        <!-- Loading spinner (shown initially) -->
        <div id="app-loading" class="flex items-center justify-center h-screen">
            <div class="text-center">
                <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-blue-500 mx-auto mb-4"></div>
                <p class="text-gray-400">Loading Wings of Capital...</p>
            </div>
        </div>
        
        <!-- App content (hidden initially) -->
        <div id="app-content" class="hidden flex flex-col flex-grow">
            <!-- Navigation Header -->
            <nav class="bg-gray-800 border-b border-gray-700">
                <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
                    <div class="flex justify-between items-center h-16">
                        <!-- Logo -->
                        <div class="flex items-center">
                            <h1 class="text-2xl font-bold text-blue-500">🪶 Wings of Capital</h1>
                        </div>
                        
                        <!-- Navigation Links -->
                        <div class="hidden md:flex space-x-8">
                            <a href="/#/dashboard" class="hover:text-blue-400 transition">Dashboard</a>
                            <a href="/#/portfolio" class="hover:text-blue-400 transition">Portfolio</a>
                            <a href="/#/trading" class="hover:text-blue-400 transition">Trading</a>
                            <a href="/#/analytics" class="hover:text-blue-400 transition">Analytics</a>
                        </div>
                        
                        <!-- User Menu -->
                        <div class="flex items-center space-x-4">
                            <button id="theme-toggle" class="p-2 rounded-lg bg-gray-700 hover:bg-gray-600">
                                🌙
                            </button>
                            <button id="logout-btn" class="px-4 py-2 bg-red-600 hover:bg-red-700 rounded-lg transition">
                                Logout
                            </button>
                        </div>
                    </div>
                </div>
            </nav>
            
            <!-- Main Content Area -->
            <main class="flex-grow max-w-7xl mx-auto w-full px-4 sm:px-6 lg:px-8 py-8">
                <!-- Views are dynamically loaded here -->
                <div id="view-container">
                    <!-- Content injected by app.js router -->
                </div>
            </main>
            
            <!-- Footer -->
            <footer class="bg-gray-800 border-t border-gray-700 mt-12">
                <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-6">
                    <div class="flex justify-between items-center text-sm text-gray-400">
                        <p>&copy; 2026 Bhargav (Wings of Capital). All rights reserved.</p>
                        <a href="https://github.com/Bhargav-2007/Wings-of-Capital" class="hover:text-blue-400">
                            GitHub Repository
                        </a>
                    </div>
                </div>
            </footer>
        </div>
    </div>
    
    <!-- Toast notifications -->
    <div id="toast-container" class="fixed top-4 right-4 space-y-2 z-50"></div>
    
    <!-- Core JavaScript modules -->
    <script src="js/state.js"></script>
    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/app.js"></script>
    
    <!-- Component modules -->
    <script src="js/components/form.js"></script>
    <script src="js/components/charts.js"></script>
    <script src="js/components/table.js"></script>
    
    <!-- View modules -->
    <script src="js/views/login.js"></script>
    <script src="js/views/dashboard.js"></script>
    <script src="js/views/portfolio.js"></script>
    <script src="js/views/trading.js"></script>
    <script src="js/views/analytics.js"></script>
    
    <!-- Utilities -->
    <script src="js/utils/validators.js"></script>
    <script src="js/utils/formatters.js"></script>
    <script src="js/utils/chart-helpers.js"></script>
    
    <!-- Service Worker Registration (PWA) -->
    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('/sw.js').catch(err => {
                console.log('ServiceWorker registration failed: ', err);
            });
        }
    </script>
</body>
</html>
