<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Wings of Capital - Secure Login">
  <meta name="theme-color" content="#111827">

  <title>Login - Wings of Capital</title>

  <!-- Preload Theme Script (Prevents flash of wrong theme) -->
  <script src="/js/theme.js"></script>

  <!-- PWA Manifest -->
  <link rel="manifest" href="/manifest.json">

  <!-- Core CSS (No Tailwind) -->
  <link rel="stylesheet" href="/css/design-system.css">
  <link rel="stylesheet" href="/css/styles.css">
  <link rel="stylesheet" href="/css/components.css">
  <link rel="stylesheet" href="/css/utilities.css">
</head>
<body class="d-flex items-center justify-center min-h-screen relative overflow-hidden">
  
  <!-- AI Mesh Background Effect -->
  <div class="absolute inset-0 z-below" style="background: var(--mesh-gradient); opacity: 0.5;"></div>

  <!-- Main Login Container -->
  <main class="w-full max-w-sm p-4 relative z-base animate-slide-up">
    
    <!-- Logo Header -->
    <div class="text-center mb-6">
      <div class="d-inline-flex items-center justify-center rounded-2xl shadow-brand mb-4" 
           style="width: 64px; height: 64px; background: linear-gradient(135deg, var(--brand-500), var(--accent-500)); font-size: 2rem;">
        🪶
      </div>
      <h1 class="text-2xl font-bold tracking-tight">Wings of Capital</h1>
      <p class="text-sm text-tertiary mt-2">Institutional-grade Web3 Fintech</p>
    </div>

    <!-- Login Card -->
    <div class="card card-glass">
      
      <!-- Toggle Tabs (Login / Register) -->
      <div class="d-flex border-bottom border-subtle mb-5">
        <button id="tab-login" class="flex-1 py-3 text-sm font-semi text-primary" style="border-bottom: 2px solid var(--color-primary);">Login</button>
        <button id="tab-register" class="flex-1 py-3 text-sm font-medium text-tertiary hover:text-primary transition-base">Register</button>
      </div>

      <!-- Login Form -->
      <form id="form-login" novalidate>
        <div class="form-group">
          <label for="login-email" class="form-label">Email Address <span class="required">*</span></label>
          <div class="input-group has-icon">
            <span class="input-icon">✉️</span>
            <input type="email" id="login-email" name="email" required data-validate="email" placeholder="investor@woc.io" autocomplete="email">
          </div>
        </div>

        <div class="form-group">
          <div class="d-flex justify-between items-center mb-2">
            <label for="login-password" class="form-label m-0">Password <span class="required">*</span></label>
            <a href="#" class="text-xs text-brand">Forgot?</a>
          </div>
          <div class="input-group has-icon has-icon-right">
            <span class="input-icon">🔑</span>
            <input type="password" id="login-password" name="password" required autocomplete="current-password" placeholder="••••••••••••">
            <span class="input-icon-right pwd-toggle" data-target="login-password">👁️</span>
          </div>
        </div>

        <button type="submit" class="btn btn-primary btn-block btn-lg mt-6">Secure Login</button>
      </form>

      <!-- Register Form (Hidden by default) -->
      <form id="form-register" class="d-none" novalidate>
        <div class="form-group">
          <label for="reg-email" class="form-label">Email Address <span class="required">*</span></label>
          <div class="input-group has-icon">
            <span class="input-icon">✉️</span>
            <input type="email" id="reg-email" name="email" required data-validate="email" placeholder="investor@woc.io">
          </div>
        </div>

        <div class="form-group">
          <label for="reg-password" class="form-label">Password <span class="required">*</span></label>
          <div class="input-group has-icon has-icon-right">
            <span class="input-icon">🔑</span>
            <input type="password" id="reg-password" name="password" required data-validate="password" placeholder="Min 12 chars, mixed case...">
            <span class="input-icon-right pwd-toggle" data-target="reg-password">👁️</span>
          </div>
          <div class="form-hint">Must contain uppercase, lowercase, numbers, and symbols.</div>
        </div>
        
        <div class="form-group">
          <label for="reg-confirm" class="form-label">Confirm Password <span class="required">*</span></label>
          <div class="input-group has-icon has-icon-right">
            <span class="input-icon">🔑</span>
            <input type="password" id="reg-confirm" name="passwordConfirm" required data-validate="match" data-match-target="reg-password" placeholder="Repeat password">
            <span class="input-icon-right pwd-toggle" data-target="reg-confirm">👁️</span>
          </div>
        </div>

        <button type="submit" class="btn btn-primary btn-block btn-lg mt-6">Create Account</button>
      </form>

    </div>
    
    <!-- Footer links -->
    <div class="text-center mt-6 text-xs text-tertiary">
      <a href="#" class="hover:text-primary">Terms of Service</a> &bull; 
      <a href="#" class="hover:text-primary">Privacy Policy</a>
    </div>

  </main>

  <!-- Global Toast Container -->
  <div id="toast-container"></div>

  <!-- Core Scripts -->
  <script src="/js/state.js"></script>
  <script src="/js/api.js"></script>
  <script src="/js/auth.js"></script>
  <script src="/js/utils/validators.js"></script>
  <script src="/js/components/form.js"></script>
  <script src="/js/views/login.js"></script>

  <!-- PWA Reg -->
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/sw.js').catch(err => console.error('SW failed', err));
      });
    }
  </script>
</body>
</html>
