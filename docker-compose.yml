services:
  # PostgreSQL - Primary OLTP database
  postgres:
    image: postgres:15-alpine
    container_name: woc_postgres
    environment:
      POSTGRES_USER: woc_user
      POSTGRES_PASSWORD: woc_password
      POSTGRES_DB: wings_of_capital
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U woc_user -d wings_of_capital"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - woc_network
    restart: unless-stopped

  # TimescaleDB - Time-series data for crypto prices, etc.
  timescaledb:
    image: timescale/timescaledb:latest-pg15
    container_name: woc_timescaledb
    environment:
      POSTGRES_USER: woc_user
      POSTGRES_PASSWORD: woc_password
      POSTGRES_DB: wings_timescale
    ports:
      - "5433:5432"
    volumes:
      - timescale_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U woc_user -d wings_timescale"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - woc_network
    restart: unless-stopped

  # Redis - Cache & session store
  redis:
    image: redis:7-alpine
    container_name: woc_redis
    command: redis-server --requirepass redis_secret_password --maxmemory 512mb --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "incr", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - woc_network
    restart: unless-stopped

  # RabbitMQ - Message broker for Celery
  rabbitmq:
    image: rabbitmq:3.12-management-alpine
    container_name: woc_rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD-SHELL", "rabbitmq-diagnostics -q ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - woc_network
    restart: unless-stopped

  # HashiCorp Vault - Secrets management
  vault:
    image: hashicorp/vault:1.17
    container_name: woc_vault
    environment:
      VAULT_DEV_ROOT_TOKEN_ID: "dev-token-12345"
      VAULT_DEV_LISTEN_ADDRESS: "0.0.0.0:8200"
    ports:
      - "8200:8200"
    cap_add:
      - IPC_LOCK
    healthcheck:
      test: ["CMD", "vault", "status", "-address=http://127.0.0.1:8200"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - woc_network
    restart: unless-stopped

  # Kong API Gateway
  kong:
    image: kong/kong:3.7
    container_name: woc_kong
    environment:
      KONG_DATABASE: "off"
      KONG_DECLARATIVE_CONFIG: /etc/kong/kong.yml
      KONG_PROXY_ACCESS_LOG: /dev/stdout
      KONG_ADMIN_ACCESS_LOG: /dev/stdout
      KONG_PROXY_ERROR_LOG: /dev/stderr
      KONG_ADMIN_ERROR_LOG: /dev/stderr
      KONG_ADMIN_LISTEN: 0.0.0.0:8001
    ports:
      - "8000:8000"   # Proxy port
      - "8443:8443"   # Proxy SSL
      - "8001:8001"   # Admin API
      - "8444:8444"   # Admin API SSL
    volumes:
      - ./backend/api_gateway/kong.yml:/etc/kong/kong.yml:ro
    healthcheck:
      test: ["CMD", "kong", "health"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - woc_network
    restart: unless-stopped

  # Auth Service - FastAPI
  auth_service:
    build:
      context: .
      dockerfile: backend/services/auth_service/Dockerfile
    container_name: woc_auth_service
    environment:
      SERVICE_NAME: "auth_service"
      DATABASE_URL: "postgresql://woc_user:woc_password@postgres:5432/wings_of_capital"
      REDIS_URL: "redis://:redis_secret_password@redis:6379/0"
      JWT_SECRET_KEY: "dev-secret-key-change-in-production"
      JWT_ALGORITHM: "HS256"
      JWT_EXPIRY_MINUTES: 60
      DEBUG: "True"
      ENVIRONMENT: "development"
      API_HOST: "0.0.0.0"
      API_PORT: "8001"
    ports:
      - "8004:8001"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      vault:
        condition: service_healthy
    volumes:
      - ./backend/services/auth_service:/app/auth_service
      - ./backend/services/shared:/app/shared
    networks:
      - woc_network
    restart: unless-stopped
    command: uvicorn auth_service.main:app --host 0.0.0.0 --port 8001 --reload

  # Ledger Service - FastAPI
  ledger_service:
    build:
      context: .
      dockerfile: backend/services/ledger_service/Dockerfile
    container_name: woc_ledger_service
    environment:
      SERVICE_NAME: "ledger_service"
      DATABASE_URL: "postgresql://woc_user:woc_password@postgres:5432/wings_of_capital"
      TIMESCALE_URL: "postgresql://woc_user:woc_password@timescaledb:5432/wings_timescale"
      REDIS_URL: "redis://:redis_secret_password@redis:6379/0"
      JWT_SECRET_KEY: "dev-secret-key-change-in-production"
      DEBUG: "True"
      ENVIRONMENT: "development"
      API_HOST: "0.0.0.0"
      API_PORT: "8002"
      CELERY_BROKER_URL: "amqp://guest:guest@rabbitmq:5672//"
    ports:
      - "8002:8002"
    depends_on:
      postgres:
        condition: service_healthy
      timescaledb:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    volumes:
      - ./backend/services/ledger_service:/app/ledger_service
      - ./backend/services/shared:/app/shared
    networks:
      - woc_network
    restart: unless-stopped
    command: uvicorn ledger_service.main:app --host 0.0.0.0 --port 8002 --reload

  # Crypto Service - FastAPI
  crypto_service:
    build:
      context: .
      dockerfile: backend/services/crypto_service/Dockerfile
    container_name: woc_crypto_service
    environment:
      SERVICE_NAME: "crypto_service"
      DATABASE_URL: "postgresql://woc_user:woc_password@postgres:5432/wings_of_capital"
      TIMESCALE_URL: "postgresql://woc_user:woc_password@timescaledb:5432/wings_timescale"
      REDIS_URL: "redis://:redis_secret_password@redis:6379/0"
      JWT_SECRET_KEY: "dev-secret-key-change-in-production"
      COINGECKO_API_KEY: "demo"
      ETHEREUM_RPC_URL: "https://eth-sepolia.g.alchemy.com/v2/demo"
      DEBUG: "True"
      ENVIRONMENT: "development"
      API_HOST: "0.0.0.0"
      API_PORT: "8003"
      CELERY_BROKER_URL: "amqp://guest:guest@rabbitmq:5672//"
    ports:
      - "8003:8003"
    depends_on:
      postgres:
        condition: service_healthy
      timescaledb:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    volumes:
      - ./backend/services/crypto_service:/app/crypto_service
      - ./backend/services/shared:/app/shared
    networks:
      - woc_network
    restart: unless-stopped
    command: uvicorn crypto_service.main:app --host 0.0.0.0 --port 8003 --reload

  # Celery Worker - Async tasks
  celery_worker:
    build:
      context: .
      dockerfile: backend/services/crypto_service/Dockerfile
    container_name: woc_celery_worker
    environment:
      SERVICE_NAME: "celery_worker"
      DATABASE_URL: "postgresql://woc_user:woc_password@postgres:5432/wings_of_capital"
      TIMESCALE_URL: "postgresql://woc_user:woc_password@timescaledb:5432/wings_timescale"
      REDIS_URL: "redis://:redis_secret_password@redis:6379/0"
      CELERY_BROKER_URL: "amqp://guest:guest@rabbitmq:5672//"
      JWT_SECRET_KEY: "dev-secret-key-change-in-production"
      DEBUG: "True"
    depends_on:
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend/services/crypto_service:/app/crypto_service
      - ./backend/services/shared:/app/shared
    networks:
      - woc_network
    restart: unless-stopped
    command: celery -A crypto_service.workers worker --loglevel=info

  celery_beat:
    build:
      context: .
      dockerfile: backend/services/crypto_service/Dockerfile
    container_name: woc_celery_beat
    environment:
      SERVICE_NAME: "celery_beat"
      DATABASE_URL: "postgresql://woc_user:woc_password@postgres:5432/wings_of_capital"
      TIMESCALE_URL: "postgresql://woc_user:woc_password@timescaledb:5432/wings_timescale"
      REDIS_URL: "redis://:redis_secret_password@redis:6379/0"
      CELERY_BROKER_URL: "amqp://guest:guest@rabbitmq:5672//"
      JWT_SECRET_KEY: "dev-secret-key-change-in-production"
      DEBUG: "True"
    depends_on:
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend/services/crypto_service:/app/crypto_service
      - ./backend/services/shared:/app/shared
    networks:
      - woc_network
    restart: unless-stopped
    command: celery -A crypto_service.workers beat --loglevel=info

  # Frontend - Simple HTTP Server (during development)
  frontend:
    image: python:3.11-slim
    container_name: woc_frontend
    volumes:
      - ./frontend:/workspace
    working_dir: /workspace
    ports:
      - "8080:8080"
    networks:
      - woc_network
    restart: unless-stopped
    command: python -m http.server 8080

volumes:
  postgres_data:
  timescale_data:
  redis_data:

networks:
  woc_network:
    driver: bridge

# Usage:
# docker-compose up -d          # Start all services
# docker-compose down           # Stop all services
# docker-compose logs -f        # View logs (all)
# docker-compose logs auth_service  # View auth service logs
# docker-compose ps             # Show service status
