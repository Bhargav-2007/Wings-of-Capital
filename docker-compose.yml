services:
  postgres:
    image: timescale/timescaledb:latest-pg16
    environment:
      POSTGRES_USER: wings
      POSTGRES_PASSWORD: wings
      POSTGRES_DB: wings_capital
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  kong:
    image: kong:3.7
    environment:
      KONG_DATABASE: "off"
      KONG_DECLARATIVE_CONFIG: /opt/kong/kong.yml
      KONG_PROXY_ACCESS_LOG: /dev/stdout
      KONG_ADMIN_ACCESS_LOG: /dev/stdout
      KONG_PROXY_ERROR_LOG: /dev/stderr
      KONG_ADMIN_ERROR_LOG: /dev/stderr
      KONG_ADMIN_LISTEN: 0.0.0.0:8001
    volumes:
      - ./kong/kong.yml:/opt/kong/kong.yml:ro
    ports:
      - "8000:8000"
      - "8007:8001"
    depends_on:
      - core-ledger

  vault:
    image: hashicorp/vault:1.17
    environment:
      VAULT_DEV_ROOT_TOKEN_ID: root
      VAULT_DEV_LISTEN_ADDRESS: 0.0.0.0:8200
    ports:
      - "8200:8200"
    cap_add:
      - IPC_LOCK

  core-ledger:
    build: ./services/core-ledger
    environment:
      SERVICE_NAME: core-ledger
    ports:
      - "8001:8000"
    depends_on:
      - postgres
      - redis

  ai-engine:
    build: ./services/ai-engine
    environment:
      SERVICE_NAME: ai-engine
    ports:
      - "8002:8000"
    depends_on:
      - postgres
      - redis

  onchain-analytics:
    build: ./services/onchain-analytics
    environment:
      SERVICE_NAME: onchain-analytics
    ports:
      - "8003:8000"
    depends_on:
      - postgres
      - redis

  payment-gateway:
    build: ./services/payment-gateway
    environment:
      SERVICE_NAME: payment-gateway
    ports:
      - "8004:8000"
    depends_on:
      - postgres
      - redis

  fraud-detection:
    build: ./services/fraud-detection
    environment:
      SERVICE_NAME: fraud-detection
    ports:
      - "8005:8000"
    depends_on:
      - postgres
      - redis

  kyc-service:
    build: ./services/kyc-service
    environment:
      SERVICE_NAME: kyc-service
    ports:
      - "8006:8000"
    depends_on:
      - postgres
      - redis

volumes:
  pgdata:
