name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service:
          - core-ledger
          - ai-engine
          - onchain-analytics
          - payment-gateway
          - fraud-detection
          - kyc-service
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install service dependencies
        run: |
          pip install -r services/${{ matrix.service }}/requirements.txt

      - name: Python syntax check
        run: |
          python -m py_compile services/${{ matrix.service }}/app.py

      - name: Run core-ledger tests
        if: matrix.service == 'core-ledger'
        run: |
          cd services/core-ledger
          pytest -q

  security-scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Trivy filesystem scan
        uses: aquasecurity/trivy-action@0.24.0
        with:
          scan-type: fs
          scan-ref: .
          ignore-unfixed: true
          format: table
          severity: CRITICAL,HIGH
