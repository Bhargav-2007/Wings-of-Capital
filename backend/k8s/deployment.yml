              value: ""
            - name: API_HOST
              value: 0.0.0.0
            - name: API_PORT
              value: "8003"
            - name: CELERY_BROKER_URL
              value: amqp://guest:guest@rabbitmq:5672//
            - name: ENVIRONMENT
